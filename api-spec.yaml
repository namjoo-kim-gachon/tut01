openapi: 3.0.0
info:
  title: 사용자 관리 API
  version: 1.0.0

paths:
  /users:
    get:
      summary: 사용자 목록 조회
      operationId: getUsers
      responses:
        "200":
          description: 사용자 목록이 반환됩니다.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      summary: 새로운 사용자 추가
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "201":
          description: 새로운 사용자가 생성되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      summary: 특정 사용자 조회
      operationId: getUserById
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 사용자 정보가 반환됩니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: 사용자를 찾을 수 없습니다.

    put:
      summary: 사용자 정보 업데이트
      operationId: updateUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "200":
          description: 사용자가 성공적으로 업데이트되었습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: 사용자를 찾을 수 없습니다.

    delete:
      summary: 사용자 삭제
      operationId: deleteUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: 사용자가 성공적으로 삭제되었습니다.
        "404":
          description: 사용자를 찾을 수 없습니다.

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          description: 고유 사용자 ID
        name:
          type: string
          description: 사용자의 이름
        email:
          type: string
          description: 사용자의 이메일 주소
      required:
        - name
        - email
